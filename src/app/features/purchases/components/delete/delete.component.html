<h2 mat-dialog-title>
  <ng-container *ngIf="!loading(); else deletingTitle">
    Delete Confirmation
  </ng-container>
</h2>

<ng-template #deletingTitle>
  Deleting Purchase
</ng-template>

<mat-dialog-content>
  <ng-container *ngIf="!loading(); else loadingContent">
    <p>
      Are you sure that you want to delete purchase
      <strong>#{{ data.purchase.id }}</strong>
      for <strong>{{ data.purchase.supplier }}</strong>?
    </p>
  </ng-container>

  <ng-template #loadingContent>
    <div class="d-flex justify-content-center align-items-center p-3">
      <mat-spinner mode="indeterminate" color="primary" diameter="40"></mat-spinner>
    </div>
  </ng-template>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <ng-container *ngIf="!loading(); else loadingActions">
    <button mat-button (click)="onCancelClick()">Cancel</button>
    <button mat-flat-button color="primary" (click)="onDeleteClick()">Delete</button>
  </ng-container>

  <ng-template #loadingActions>
    <button mat-button color="primary" disabled>Loading...</button>
  </ng-template>
</mat-dialog-actions>
