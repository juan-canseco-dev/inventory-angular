<form [formGroup]="parent" (ngSubmit)="onSubmit()" style="min-width: 512px;">
  <h2 mat-dialog-title>Create Unit Of Measurement</h2>

  <mat-dialog-content>
    <mat-form-field appearance="fill" class="w-100 my-2">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" placeholder="Name" [readonly]="loading()" />

      <mat-error *ngIf="name.hasError('required')">
        Name is <strong>required</strong>
      </mat-error>

      <mat-error *ngIf="name.hasError('maxlength')">
        The maximum length is <strong>50 characters</strong>
      </mat-error>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="onCancelClick()" [disabled]="loading()">
      Cancel
    </button>
    <button mat-button="filled" color="primary" type="submit" [disabled]="parent.invalid || loading()">
      {{ loading() ? 'Saving...' : 'Save' }}
    </button>
  </mat-dialog-actions>
</form>
